name: 运行 Bot (6小时)

on:
  workflow_dispatch:    # 手动触发

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6小时
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 启动 Bot
        run: python bot.py   # Token 已在代码内硬编码
