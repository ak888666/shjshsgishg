name: 运行 Telegram Bot（6小时）

on:
  workflow_dispatch:    # 手动触发

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6小时（360分钟）
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 启动 Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}   # 如果不硬编码，则通过环境变量读取
        run: python bot.py
